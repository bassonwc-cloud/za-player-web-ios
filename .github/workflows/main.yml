name: Build Unsigned iOS IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Show tools
        run: |
          sw_vers
          xcodebuild -version
          node -v
          pod --version
      - name: Make build script executable
        run: chmod +x ./build-unsigned-ipa.sh
      - name: Build unsigned IPA
        run: ./build-unsigned-ipa.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ZA-Player-Pro-Web-unsigned-ipa
          path: build/ZA-Player-Pro-Web-unsigned.ipa
          if-no-files-found: error
          retention-days: 30
